<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span>Inventory Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-link">
          <img src="icons/dashboard.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Dashboard</span>
        </a>
        <a href="inventory.html" class="nav-link active">
          <img src="icons/inventory.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Inventory</span>
        </a>
        <a href="orders.html" class="nav-link">
          <img src="icons/order.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Orders</span>
        </a>
        <a href="delivery.html" class="nav-link">
          <img src="icons/delivery.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Delivery</span>
        </a>
        <a href="suppliers.html" class="nav-link">
          <img src="icons/supplier.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Suppliers</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-email" id="sidebar-email"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
      </div>
    </aside>
    <main class="main">
      <header class="page-header">
        <h1>Inventory</h1>
        <p class="subtitle">Manage products and stock levels</p>
        <button type="button" class="btn btn-primary" id="add-product-btn">Add product</button>
      </header>
      <div class="toolbar">
        <input type="search" id="inventory-search" class="input" placeholder="Search products..." aria-label="Search products" />
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Product</th>
                <th>SKU</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="inventory-tbody">
              <tr><td colspan="7" class="muted">No products yet. Add your first product.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div id="product-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="product-modal-title">Add product</h2>
        <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="product-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="product-name">Name</label>
            <input type="text" id="product-name" required placeholder="Product name" />
          </div>
          <div class="form-group">
            <label for="product-sku">SKU</label>
            <input type="text" id="product-sku" placeholder="e.g. SKU-001" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="product-category">Category</label>
            <input type="text" id="product-category" placeholder="e.g. Electronics" />
          </div>
          <div class="form-group">
            <label for="product-quantity">Quantity</label>
            <input type="number" id="product-quantity" min="0" value="0" required />
          </div>
          <div class="form-group">
            <label for="product-unit">Unit</label>
            <select id="product-unit">
              <option value="pcs">pcs</option>
              <option value="kg">kg</option>
              <option value="L">L</option>
              <option value="box">box</option>
              <option value="unit">unit</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="product-threshold">Low stock threshold</label>
          <input type="number" id="product-threshold" min="0" value="5" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary">Save product</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/inventory.js"></script>
</body>
</html>
