<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span>Inventory Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-link">
          <img src="icons/dashboard.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Dashboard</span>
        </a>
        <a href="inventory.html" class="nav-link">
          <img src="icons/inventory.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Inventory</span>
        </a>
        <a href="orders.html" class="nav-link">
          <img src="icons/order.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Orders</span>
        </a>
        <a href="delivery.html" class="nav-link active">
          <img src="icons/delivery.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Delivery</span>
        </a>
        <a href="suppliers.html" class="nav-link">
          <img src="icons/supplier.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Suppliers</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-email" id="sidebar-email"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
      </div>
    </aside>
    <main class="main">
      <header class="page-header">
        <h1>Delivery</h1>
        <p class="subtitle">Track shipments and update delivery status</p>
        <button type="button" class="btn btn-primary" id="add-delivery-btn">New delivery</button>
      </header>
      <div class="toolbar">
        <select id="delivery-filter" class="input" aria-label="Filter by status">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="picked_up">Picked up</option>
          <option value="in_transit">In transit</option>
          <option value="out_for_delivery">Out for delivery</option>
          <option value="delivered">Delivered</option>
        </select>
        <input type="search" id="delivery-search" class="input" placeholder="Search by tracking or order..." aria-label="Search deliveries" />
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Tracking ID</th>
                <th>Order</th>
                <th>Carrier</th>
                <th>Status</th>
                <th>Estimated date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="delivery-tbody">
              <tr><td colspan="6" class="muted">No deliveries yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div id="delivery-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="delivery-modal-title">New delivery</h2>
        <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      </div>
      <form id="delivery-form">
        <input type="hidden" id="delivery-id" />
        <div class="form-group">
          <label for="delivery-order">Order</label>
          <select id="delivery-order" required>
            <option value="">Select an order</option>
          </select>
        </div>
        <div class="form-group">
          <label for="delivery-tracking">Tracking number / ID</label>
          <input type="text" id="delivery-tracking" placeholder="e.g. 1Z999AA10123456784" />
        </div>
        <div class="form-group">
          <label for="delivery-carrier">Carrier</label>
          <input type="text" id="delivery-carrier" placeholder="e.g. FedEx, DHL, UPS" />
        </div>
        <div class="form-group">
          <label for="delivery-estimated">Estimated delivery date</label>
          <input type="date" id="delivery-estimated" />
        </div>
        <div class="form-group">
          <label for="delivery-address">Delivery address</label>
          <textarea id="delivery-address" rows="2" placeholder="Full address"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary">Save delivery</button>
        </div>
      </form>
    </div>
  </div>
  <div id="delivery-status-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Update delivery status</h2>
        <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      </div>
      <form id="delivery-status-form">
        <input type="hidden" id="status-delivery-id" />
        <div class="form-group">
          <label for="status-select">Status</label>
          <select id="status-select">
            <option value="pending">Pending</option>
            <option value="picked_up">Picked up</option>
            <option value="in_transit">In transit</option>
            <option value="out_for_delivery">Out for delivery</option>
            <option value="delivered">Delivered</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary">Update</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/delivery.js"></script>
</body>
</html>
