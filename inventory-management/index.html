<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <header class="auth-header">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <h1>Inventory Manager</h1>
      </div>
      <p class="auth-tagline">Sign in to manage your inventory</p>
    </header>
    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" required placeholder="you@company.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p id="login-error" class="form-error" aria-live="polite"></p>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>
  </div>
  <script src="js/auth.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
