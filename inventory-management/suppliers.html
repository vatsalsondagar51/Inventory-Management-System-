<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span>Inventory Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-link">
          <img src="icons/dashboard.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Dashboard</span>
        </a>
        <a href="inventory.html" class="nav-link">
          <img src="icons/inventory.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Inventory</span>
        </a>
        <a href="orders.html" class="nav-link">
          <img src="icons/order.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Orders</span>
        </a>
        <a href="delivery.html" class="nav-link">
          <img src="icons/delivery.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Delivery</span>
        </a>
        <a href="suppliers.html" class="nav-link active">
          <img src="icons/supplier.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Suppliers</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-email" id="sidebar-email"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
      </div>
    </aside>
    <main class="main">
      <header class="page-header">
        <h1>Suppliers</h1>
        <p class="subtitle">Manage supplier contacts</p>
        <button type="button" class="btn btn-primary" id="add-supplier-btn">Add supplier</button>
      </header>
      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>Email</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="suppliers-tbody">
              <tr><td colspan="4" class="muted">No suppliers yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div id="supplier-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="supplier-modal-title">Add supplier</h2>
        <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      </div>
      <form id="supplier-form">
        <input type="hidden" id="supplier-id" />
        <div class="form-group">
          <label for="supplier-name">Company name</label>
          <input type="text" id="supplier-name" required placeholder="Supplier Co." />
        </div>
        <div class="form-group">
          <label for="supplier-contact">Contact person / Phone</label>
          <input type="text" id="supplier-contact" placeholder="Name or phone" />
        </div>
        <div class="form-group">
          <label for="supplier-email">Email</label>
          <input type="email" id="supplier-email" placeholder="supplier@example.com" />
        </div>
        <div class="form-group">
          <label for="supplier-address">Address</label>
          <textarea id="supplier-address" rows="2" placeholder="Full address"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/suppliers.js"></script>
</body>
</html>
