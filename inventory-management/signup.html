<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <header class="auth-header">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <h1>Inventory Manager</h1>
      </div>
      <p class="auth-tagline">Create your account</p>
    </header>
    <form id="signup-form" class="auth-form">
      <div class="form-group">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" name="name" required placeholder="Jane Doe" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" required placeholder="you@company.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="signup-confirm">Confirm password</label>
        <input type="password" id="signup-confirm" name="confirm" required placeholder="••••••••" autocomplete="new-password" />
      </div>
      <p id="signup-error" class="form-error" aria-live="polite"></p>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
    <p class="auth-footer">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>
  <script src="js/auth.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
