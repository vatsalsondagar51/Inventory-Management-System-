<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Inventory Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span>Inventory Manager</span>
      </div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-link active">
          <img src="icons/dashboard.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Dashboard</span>
        </a>
        <a href="inventory.html" class="nav-link">
          <img src="icons/inventory.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Inventory</span>
        </a>
        <a href="orders.html" class="nav-link">
          <img src="icons/order.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Orders</span>
        </a>
        <a href="delivery.html" class="nav-link">
          <img src="icons/delivery.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Delivery</span>
        </a>
        <a href="suppliers.html" class="nav-link">
          <img src="icons/supplier.png" alt="" class="nav-icon" aria-hidden="true">
          <span>Suppliers</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-email" id="sidebar-email"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
      </div>
    </aside>
    <main class="main">
      <header class="page-header">
        <h1>Dashboard</h1>
        <p class="subtitle">Overview of your inventory and activity</p>
      </header>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total Products</span>
          <span class="stat-value" id="stat-products">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Low Stock Items</span>
          <span class="stat-value stat-warn" id="stat-low-stock">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Pending Orders</span>
          <span class="stat-value" id="stat-orders">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Deliveries in Transit</span>
          <span class="stat-value" id="stat-deliveries">0</span>
        </div>
      </div>
      <section class="card">
        <h2>Recent activity</h2>
        <div id="recent-activity" class="activity-list">
          <p class="muted">No recent activity yet.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>if (window.location.protocol !== 'file:') window.API_BASE = 'api/';</script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
